# Minimal config so the CLI can deploy Edge Functions. Schema/data changes are
# applied via the Management API (see .devtools/apply-sql.mjs), not local db.
project_id = "personal_health"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = false

[studio]
enabled = false
port = 54323

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:8081"

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.lookup-product-barcode]
verify_jwt = true

[functions.analyze-product]
verify_jwt = true
